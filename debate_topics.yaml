nuclear_deterrence:
  id: nuclear_deterrence
  title: 核武装と拡大抑止
  summary: >-
    日本は米国の拡大抑止に依存し続けるべきか、それとも独自の核保有や
    核共有の議論に踏み込むべきかが争点。安全保障、外交、財政、国際世論が絡む。
  key_points:
    - 北東アジアの安全保障環境と抑止力の実効性
    - NPT体制や被爆国としての外交的立場
    - 核共有、敵基地反撃能力、防衛費拡大の現実性
    - 世論の分断と近隣諸国への影響

social_security_reform:
  id: social_security_reform
  title: 社会保障改革と現役世代負担
  summary: >-
    高齢化が進む中で、年金、医療、介護をどう持続可能にするかが焦点。
    給付維持、負担増、少子化対策、所得再分配の優先順位が問われる。
  key_points:
    - 年金財政の持続可能性と最低保障機能
    - 医療・介護保険の自己負担見直し
    - 子育て支援と高齢者給付のバランス
    - 現役世代の保険料負担と税財源

economic_stimulus:
  id: economic_stimulus
  title: 物価高対策と経済成長
  summary: >-
    実質賃金の低迷、円安、エネルギー価格上昇を背景に、
    減税、給付、投資促進、賃上げ支援のどれを優先するかが争点。
  key_points:
    - 消費税減税か targeted 給付か
    - 賃上げと中小企業支援の両立
    - エネルギー価格高騰への補助
    - 財政規律と成長投資のバランス

energy_transition:
  id: energy_transition
  title: 原発再稼働と再生可能エネルギー
  summary: >-
    電力安定供給と脱炭素を両立するために、原発再稼働を進めるのか、
    再エネ拡大を優先するのか、送電網整備や国民負担も含めて議論する。
  key_points:
    - 原発再稼働の安全基準と地元同意
    - 再エネ拡大と電気料金への影響
    - 火力依存からの移行戦略
    - エネルギー安全保障と脱炭素投資

population_decline:
  id: population_decline
  title: 少子化対策と働き方改革
  summary: >-
    出生率低下が続く中で、現金給付、教育無償化、住宅支援、労働時間改革、
    移民政策などをどう組み合わせるべきかが問われる。
  key_points:
    - 子育て世帯への直接給付と教育費軽減
    - 非正規雇用と若年層の将来不安
    - 共働き前提の保育・介護インフラ
    - 地方人口流出と外国人労働者政策
