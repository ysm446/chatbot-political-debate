<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 尋問ゲーム</title>
    <link rel="stylesheet" href="./game.css" />
  </head>
  <body>
    <!-- シナリオ選択画面 -->
    <div id="scenarioScreen" class="screen">
      <div class="scenario-container">
        <h1 class="game-title">AI 尋問ゲーム</h1>
        <p class="game-subtitle">犯罪グループの4人を尋問し、ボスを探し出せ。</p>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="scenarios">シナリオ</button>
          <button class="tab-btn" data-tab="models">モデル</button>
        </div>

        <div id="tabScenarios" class="tab-panel">
          <div id="scenarioList" class="scenario-list"></div>
        </div>

        <div id="tabModels" class="tab-panel hidden">
          <div id="modelList" class="model-list"></div>
        </div>

        <div id="loadingMsg" class="loading-msg">サーバーに接続中...</div>
      </div>
    </div>

    <!-- 尋問メイン画面 -->
    <div id="gameScreen" class="screen hidden">
      <header class="game-header">
        <div class="header-left">
          <span id="scenarioTitle" class="scenario-badge"></span>
        </div>
        <div class="header-right">
          <button id="accuseBtn" class="accuse-btn">ボスを指名する</button>
          <button id="restartBtn" class="restart-btn">やり直す</button>
        </div>
      </header>

      <div class="game-layout">
        <!-- 左: 容疑者リスト -->
        <aside class="suspect-panel">
          <h2>容疑者</h2>
          <div id="suspectList" class="suspect-list"></div>
        </aside>

        <!-- 右: 尋問室 -->
        <main class="interrogation-panel">
          <div class="interrogation-header">
            <div class="header-name-row">
              <span id="currentSuspectName" class="current-name">容疑者を選択してください</span>
              <span id="currentSuspectOccupation" class="current-occ"></span>
            </div>
            <div id="suspectProfile" class="suspect-profile hidden">
              <div class="profile-with-image">
                <div id="suspectImageContainer" class="suspect-image-container">
                  <img id="suspectImage" class="suspect-image hidden" src="" alt="" />
                  <div id="suspectImagePlaceholder" class="suspect-image-placeholder">
                    <div class="image-loading-spinner"></div>
                    <span>画像生成中...</span>
                  </div>
                </div>
                <div class="profile-details">
                  <div class="profile-row">
                    <span class="profile-label">経歴</span>
                    <span id="profileBackground" class="profile-value"></span>
                  </div>
                  <div class="profile-row">
                    <span class="profile-label">アリバイ</span>
                    <span id="profileAlibi" class="profile-value alibi-text"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="chatLog" class="chat-log"></div>
          <div class="input-area">
            <textarea
              id="messageInput"
              class="message-input"
              placeholder="質問を入力してください..."
              rows="2"
              disabled
            ></textarea>
            <button id="sendBtn" class="send-btn" disabled>送信</button>
          </div>
        </main>
      </div>
    </div>

    <!-- 指名モーダル -->
    <div id="accuseModal" class="modal hidden">
      <div class="modal-box">
        <h2>ボスを指名する</h2>
        <p>誰がボスだと思いますか？</p>
        <div id="accuseList" class="accuse-list"></div>
        <button id="cancelAccuseBtn" class="cancel-btn">キャンセル</button>
      </div>
    </div>

    <!-- 結果モーダル -->
    <div id="resultModal" class="modal hidden">
      <div class="modal-box result-box">
        <div id="resultIcon" class="result-icon"></div>
        <h2 id="resultTitle"></h2>
        <p id="resultMessage"></p>
        <button id="playAgainBtn" class="play-again-btn">もう一度プレイ</button>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
