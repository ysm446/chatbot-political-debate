<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 政治討論シミュレーター</title>
    <link rel="stylesheet" href="./game.css" />
  </head>
  <body>
    <!-- シナリオ選択画面 -->
    <div id="scenarioScreen" class="screen">
      <div class="scenario-container">
        <h1 class="game-title">AI 政治討論シミュレーター</h1>
        <p class="game-subtitle">司会者として各党の議員に問いかけ、論点を深めてください。</p>

        <div class="tab-bar">
          <button class="tab-btn active" data-tab="scenarios">シナリオ</button>
          <button class="tab-btn" data-tab="models">モデル</button>
        </div>

        <div id="tabScenarios" class="tab-panel">
          <div id="scenarioList" class="scenario-list"></div>
        </div>

        <div id="tabModels" class="tab-panel hidden">
          <div id="modelList" class="model-list"></div>
        </div>

        <div id="loadingMsg" class="loading-msg">サーバーに接続中...</div>
      </div>
    </div>

    <!-- 討論メイン画面 -->
    <div id="gameScreen" class="screen hidden">
      <header class="game-header">
        <div class="header-left">
          <span id="scenarioTitle" class="scenario-badge"></span>
        </div>
        <div class="header-right">
          <button id="restartBtn" class="restart-btn">やり直す</button>
        </div>
      </header>

      <div class="game-layout">
        <!-- 左: 登壇者リスト -->
        <aside class="suspect-panel">
          <h2>登壇議員</h2>
          <div id="suspectList" class="suspect-list"></div>
        </aside>

        <!-- 右: 討論エリア -->
        <main class="interrogation-panel">
          <div class="interrogation-header">
            <div class="header-name-row">
              <span id="currentSuspectName" class="current-name">議員を選択してください</span>
              <span id="currentSuspectOccupation" class="current-occ"></span>
            </div>
            <div id="suspectProfile" class="suspect-profile hidden">
              <div class="profile-with-image">
                <div id="suspectImageContainer" class="suspect-image-container">
                  <img id="suspectImage" class="suspect-image hidden" src="" alt="" />
                  <div id="suspectImagePlaceholder" class="suspect-image-placeholder">
                    <div class="image-loading-spinner"></div>
                    <span>画像生成中...</span>
                  </div>
                </div>
                <div class="profile-details">
                  <div class="profile-row">
                    <span class="profile-label">プロフィール</span>
                    <span id="profileBackground" class="profile-value"></span>
                  </div>
                  <div class="profile-row">
                    <span class="profile-label">党の立場</span>
                    <span id="profileAlibi" class="profile-value alibi-text"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="chatLog" class="chat-log"></div>
          <div class="input-area">
            <textarea
              id="messageInput"
              class="message-input"
              placeholder="司会者として質問を入力してください..."
              rows="2"
              disabled
            ></textarea>
            <button id="sendBtn" class="send-btn" disabled>送信</button>
          </div>
        </main>
      </div>
    </div>

    <script src="./game.js"></script>
  </body>
</html>
