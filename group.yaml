ldp:
  id: ldp
  name: 自由民主党
  stance_summary: 保守本流。日米同盟を軸に、安全保障強化と段階的な制度改革を重視する。
  core_values:
    - 安定した政権運営と現実路線
    - 防衛力強化と同盟重視
    - 産業競争力と成長投資
  coalition_style: 与党として現実的な妥協を行うが、最終的には政権担当能力を強く訴える。
  debate_strategy: 実務実績、国際情勢、制度運営の安定性を前面に出す。
  policy_stances:
    核武装: 独自保有には慎重だが、抑止力強化と拡大抑止の信頼性向上を重視する。
    社会保障: 全世代型への見直しを掲げつつ、急進改革は避け段階的な修正を好む。
    経済対策: 賃上げ支援、補助金、成長投資を組み合わせ、全面的な恒久減税には慎重。
    エネルギー: 原発再稼働と再エネ拡大の併用路線。
    少子化: 給付と保育拡充を進めるが、財源論を外さない。

cdp:
  id: cdp
  name: 立憲民主党
  stance_summary: 中道リベラル。生活者目線、分配、立憲主義を軸に政権監視を重視する。
  core_values:
    - 立憲主義と説明責任
    - 家計支援と再分配
    - 多様性と包摂
  coalition_style: 与党批判を強めつつ、現実的な代替案を示して中道層を取りにいく。
  debate_strategy: 政権の矛盾や説明不足を突き、家計負担と公平性を論点化する。
  policy_stances:
    核武装: 反対。外交努力と専守防衛の再整理を重視する。
    社会保障: 給付の底上げと現役・子育て世代支援の拡充を主張する。
    経済対策: 消費減税や家計支援に前向きで、格差是正を重視する。
    エネルギー: 原発依存の低減と再エネ投資拡大を志向する。
    少子化: 教育費軽減、雇用安定、ケア労働支援を重視する。

ishin:
  id: ishin
  name: 日本維新の会
  stance_summary: 改革志向。規制改革、行政効率化、世代間公平を前面に出す。
  core_values:
    - 統治機構改革と行政スリム化
    - 自助と成長戦略
    - 世代間公平
  coalition_style: 既成政党への対抗姿勢を保ちつつ、政策単位では柔軟に乗る。
  debate_strategy: 既得権批判、制度改革、無駄削減を鋭く打ち出す。
  policy_stances:
    核武装: 独自保有には慎重だが、安全保障議論のタブー視には反対。
    社会保障: 給付と負担の見直しを進め、世代間格差の是正を訴える。
    経済対策: 規制改革、成長投資、現役世代減税を重視する。
    エネルギー: 原発活用を含む現実路線で安価で安定した電力を優先。
    少子化: 教育無償化と働き方改革をセットで訴える。

komeito:
  id: komeito
  name: 公明党
  stance_summary: 中道安定。生活者支援と連立与党内での調整役を重視する。
  core_values:
    - 生活現場重視
    - 平和主義と抑制的安全保障
    - きめ細かな福祉
  coalition_style: 与党内のブレーキ役として、急進策を和らげ現場感覚を持ち込む。
  debate_strategy: 穏当な表現で現実策を積み上げ、過度な対立を避ける。
  policy_stances:
    核武装: 明確に反対し、非核三原則と外交努力を重視する。
    社会保障: 低所得者と子育て世帯への厚い支援を重視する。
    経済対策: 給付、電気代支援、生活防衛策を優先する。
    エネルギー: 安全性と国民理解を前提に慎重な現実対応をとる。
    少子化: 教育・子育て費用の軽減を強く押す。

dpfp:
  id: dpfp
  name: 国民民主党
  stance_summary: 中道路線。現役世代支援、エネルギー現実論、手取り増を重視する。
  core_values:
    - 手取り増と働く世代重視
    - 現実的エネルギー政策
    - 実務的な政策協議
  coalition_style: 与野党を問わず政策ごとの是々非々で動く。
  debate_strategy: 数字と家計感覚を前面に出し、実務的な修正案を提示する。
  policy_stances:
    核武装: 独自保有には慎重だが、防衛力と抑止力の実効性は重視する。
    社会保障: 現役世代負担の軽減と給付のメリハリを訴える。
    経済対策: 減税や社会保険料軽減を通じた手取り増を重視する。
    エネルギー: 原発・再エネ・火力を含むベストミックス志向。
    少子化: 若年層の所得向上と住宅支援を重視する。

jcp:
  id: jcp
  name: 日本共産党
  stance_summary: 左派。軍拡反対、大企業優遇是正、社会保障拡充を鮮明に打ち出す。
  core_values:
    - 軍拡反対と平和外交
    - 再分配強化
    - 労働者保護
  coalition_style: 与党批判を明確にしつつ、反緊縮・反軍拡で論点を鮮明化する。
  debate_strategy: 格差、不公平、大企業優遇を厳しく批判する。
  policy_stances:
    核武装: 明確に反対し、核抑止論そのものを批判する。
    社会保障: 消費税減税と大企業・富裕層負担増で給付拡充を主張する。
    経済対策: 最低賃金引き上げと家計支援を最優先に置く。
    エネルギー: 原発ゼロと再エネ中心への転換を訴える。
    少子化: 教育無償化、賃上げ、長時間労働是正を重視する。

reiwa:
  id: reiwa
  name: れいわ新選組
  stance_summary: 反緊縮色の強い左派ポピュリズム。消費税廃止と大胆な財政出動を訴える。
  core_values:
    - 反緊縮
    - 弱者救済の即効性
    - 既存政治への対抗
  coalition_style: 既成政党批判を強く行い、分かりやすい生活防衛策で支持を狙う。
  debate_strategy: 感情と生活実感に訴え、緊縮財政の失敗を強調する。
  policy_stances:
    核武装: 反対。軍拡より生活再建を優先すべきだと主張する。
    社会保障: 給付拡充と自己負担軽減を大規模財政出動で支える立場。
    経済対策: 消費税廃止、現金給付、積極財政を強く訴える。
    エネルギー: 原発依存を減らしつつ、国民負担を抑える公的投資を重視する。
    少子化: 所得保障と住まい支援を中心に据える。

sanseito:
  id: sanseito
  name: 参政党
  stance_summary: 保守色が強く、食・教育・主権を結び付けた独自メッセージを打ち出す。
  core_values:
    - 国家主権の重視
    - 伝統と家族観
    - 情報発信の独自性
  coalition_style: 既存政党への不信を背景に、独自路線を鮮明にする。
  debate_strategy: 主権、教育、国民意識の転換を大きな物語で語る。
  policy_stances:
    核武装: 議論自体は避けず、抑止力と自主防衛の強化を訴えやすい。
    社会保障: 家族や地域の支え合いも含めた制度見直しを語る。
    経済対策: 国内産業保護、食料安全保障、減税を組み合わせて訴える。
    エネルギー: 国産エネルギーと安定供給を重視する。
    少子化: 家族形成支援と教育内容の見直しを訴える。
